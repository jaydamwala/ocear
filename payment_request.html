<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Request - Sizzle&amp;Spice</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #2d3436;
            --white: #ffffff;
            --bg-light: #f9f9f9;
            --text-color: #4a4a4a;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .request-container {
            background: var(--white);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .status-icon {
            font-size: 4rem;
            color: #f8b500;
            margin-bottom: 20px;
        }

        h2 { color: var(--secondary-color); margin-bottom: 15px; }
        p { color: #666; margin-bottom: 10px; }

        .admin-actions {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px dashed #eee;
        }

        .btn-approve {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        .btn-approve:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="request-container">
        <i class="fas fa-hourglass-half status-icon"></i>
        <h2>Payment Request Sent</h2>
        <p>The payment request has been received.</p>
        
        <div style="background: #f8f9fa; padding: 20px; border-radius: 10px; margin: 20px 0; text-align: left; border: 1px solid #eee;">
            <h4 style="margin-bottom: 15px; color: var(--secondary-color); border-bottom: 1px solid #ddd; padding-bottom: 10px;">Request Details</h4>
            <p style="margin-bottom: 8px;"><strong>Plan:</strong> <span id="reqPlan">...</span></p>
            <p style="margin-bottom: 8px;"><strong>Amount:</strong> <span id="reqPrice">...</span></p>
            <p style="margin-bottom: 0;"><strong>Status:</strong> <span style="color: #f8b500; font-weight: 600;">Pending Approval</span></p>
        </div>

        <div class="admin-actions">
            <p style="margin-bottom: 15px; font-weight: 500; color: var(--secondary-color);">Admin Panel</p>
            <button class="btn-approve" onclick="window.location.href='success.html'">
                <i class="fas fa-check-circle"></i> Accept Payment
            </button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan');
        const price = urlParams.get('price');

        if (plan) {
            document.getElementById('reqPlan').textContent = plan.charAt(0).toUpperCase() + plan.slice(1) + ' Plan';
        } else {
            document.getElementById('reqPlan').textContent = 'Standard Plan';
        }
        
        if (price) {
            document.getElementById('reqPrice').textContent = '₹' + price;
        }
    </script>
</body>
</html>
