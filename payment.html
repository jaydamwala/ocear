<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - Sizzle&amp;Spice</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff6b35;
            --secondary-color: #2d3436;
            --white: #ffffff;
            --bg-light: #f9f9f9;
            --text-color: #4a4a4a;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-container {
            background: var(--white);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
        }

        .payment-header { text-align: center; margin-bottom: 30px; }
        .payment-header h2 { color: var(--secondary-color); margin-bottom: 10px; }
        .payment-header i { font-size: 3rem; color: var(--primary-color); margin-bottom: 15px; }

        .plan-summary {
            background: #fff5f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #ffdecb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .plan-name { font-weight: 600; color: var(--secondary-color); font-size: 1.1rem; }
        .plan-price { font-weight: 700; color: var(--primary-color); font-size: 1.3rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; color: var(--secondary-color); }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1); }

        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        .btn-pay {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color), #ff8c5a);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }
        .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4); }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: var(--primary-color); }

        .payment-tabs {
            display: flex;
            margin-bottom: 25px;
            background: #f1f1f1;
            border-radius: 50px;
            padding: 5px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
            color: var(--text-color);
        }
        .tab.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 2px 10px rgba(255, 107, 53, 0.3);
        }
        .qr-container {
            text-align: center;
            padding: 10px;
        }
        .qr-code {
            width: 180px;
            height: 180px;
            margin-bottom: 15px;
            border: 2px dashed #ddd;
            padding: 10px;
            border-radius: 12px;
        }
        .scan-instruction {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <i class="fas fa-shield-alt"></i>
            <h2>Secure Payment</h2>
            <p>Complete your subscription to Sizzle&amp;Spice</p>
        </div>
        
        <div class="plan-summary">
            <div>
                <div class="plan-name" id="planName">Monthly Plan</div>
                <small style="color: #666;">Billed immediately</small>
            </div>
            <div class="plan-price" id="planPrice">₹299</div>
        </div>

        <div class="payment-tabs">
            <div class="tab active" onclick="switchMethod('card')">Card Payment</div>
            <div class="tab" onclick="switchMethod('qr')">Scan & Pay</div>
        </div>

        <div id="card-method" class="payment-method">
            <form id="paymentForm">
            <div class="form-group">
                <label>Cardholder Name</label>
                <input type="text" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label>Card Number</label>
                <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" required>
            </div>
            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" placeholder="MM/YY" maxlength="5" required>
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="password" placeholder="123" maxlength="3" required>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-pay">Pay Securely</button>
        </form>
        </div>

        <div id="qr-method" class="payment-method" style="display: none;">
            <div class="qr-container">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=flavorhub@upi&pn=Sizzle%26Spice&am=299&cu=INR" alt="Payment QR Code" class="qr-code" id="qrImage">
                <div class="form-group" style="text-align: left; margin-bottom: 15px;">
                    <label>Your Name</label>
                    <input type="text" id="qrName" placeholder="Enter your name" required>
                </div>
                <p class="scan-instruction">Scan with any UPI app (GPay, PhonePe, Paytm)</p>
                <button class="btn-pay" onclick="simulateQrPayment()">I have made the payment</button>
            </div>
        </div>
        
        <a href="AGI.HTML" class="back-link"><i class="fas fa-arrow-left"></i> Cancel and Return</a>
    </div>

    <script>
        // Get URL parameters for dynamic content
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan');
        const price = urlParams.get('price');

        if (plan) {
            document.getElementById('planName').textContent = plan.charAt(0).toUpperCase() + plan.slice(1) + ' Plan';
        }
        if (price) {
            document.getElementById('planPrice').textContent = '₹' + price;
            // Update QR code with correct amount
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=flavorhub@upi&pn=Sizzle%26Spice&am=${price}&cu=INR`;
        }

        // Handle form submission
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('.btn-pay');
            const originalText = btn.textContent;
            
            // Simulate processing
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.style.opacity = '0.9';
            btn.disabled = true;
            
            setTimeout(() => {
                const plan = urlParams.get('plan') || 'Monthly';
                const price = urlParams.get('price') || '299';
                const name = this.querySelector('input[placeholder="e.g. John Doe"]').value;
                
                fetch('/api/payment-requests', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, plan, price })
                }).then(() => {
                    alert('Payment Request Sent Successfully!');
                    window.location.href = 'AGI.HTML';
                });
            }, 2000);
        });

        // Simple card number formatting
        const cardInput = document.querySelector('input[placeholder="0000 0000 0000 0000"]');
        cardInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            let formattedValue = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) formattedValue += ' ';
                formattedValue += value[i];
            }
            e.target.value = formattedValue;
        });

        // Switch Payment Method
        function switchMethod(method) {
            const methods = document.querySelectorAll('.payment-method');
            const tabs = document.querySelectorAll('.tab');
            
            methods.forEach(el => el.style.display = 'none');
            tabs.forEach(el => el.classList.remove('active'));
            
            if (method === 'card') {
                document.getElementById('card-method').style.display = 'block';
                tabs[0].classList.add('active');
            } else {
                document.getElementById('qr-method').style.display = 'block';
                tabs[1].classList.add('active');
            }
        }

        function simulateQrPayment() {
            const btn = document.querySelector('#qr-method .btn-pay');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            btn.style.opacity = '0.9';
            btn.disabled = true;
            
            setTimeout(() => {
                const plan = urlParams.get('plan') || 'Monthly';
                const price = urlParams.get('price') || '299';
                const name = document.getElementById('qrName').value || 'Guest';
                
                fetch('/api/payment-requests', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, plan, price })
                }).then(() => {
                    alert('Payment Request Sent Successfully!');
                    window.location.href = 'AGI.HTML';
                });
            }, 2000);
        }
    </script>
</body>
</html>
